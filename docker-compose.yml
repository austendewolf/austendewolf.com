services:
  db:
    image: postgres:17
    container_name: austendewolf.com
    restart: unless-stopped
    environment:
      POSTGRES_DB: austendewolfdotcom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local
    ports:
      - "5435:5432"
    volumes:
      - austendewolfdotcom-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d austendewolfdotcom"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  austendewolfdotcom-pg-data:
